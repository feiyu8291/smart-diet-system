spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:-host.docker.internal}:${DB_PORT:-5432}/${DB_NAME:-smart_diet}
    username: ${DB_USER:-postgres}
    password: ${DB_PASSWORD:-postgres}
  data:
    redis:
      host: ${REDIS_HOST:-redis}
      port: ${REDIS_PORT:-6379}
      password: ${REDIS_PWD:-}
      database: ${REDIS_DB:-0}

minio:
  endpoint: ${MINIO_ENDPOINT:-http://host.docker.internal:9000}
  bucketName: ${MINIO_BUCKET:-smart-diet}
  accessKey: ${MINIO_ACCESS_KEY:-minioadmin}
  secretKey: ${MINIO_SECRET_KEY:-minioadmin}
