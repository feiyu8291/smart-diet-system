server:
  port: 8080

spring:
  application:
    name: smart-diet-backend
  profiles:
    active: dev
  
  # Flyway 迁移配置
  flyway:
    enabled: true
    clean-disabled: true
    baseline-on-migrate: true
    baseline-version: 1.0.2
    locations: classpath:db/migration

  # Quartz 定时任务配置（JDBC 数据库持久化存储）
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org:
        quartz:
          scheduler:
            instanceName: DietScheduler
            instanceId: AUTO
          jobStore:
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            tablePrefix: QRTZ_
            isClustered: true
            clusterCheckinInterval: 20000
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 10
            threadPriority: 5

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.diet.modules.system.model.entity,com.diet.modules.biz.model.entity,com.diet.modules.quartz.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

# 智能膳食系统自定义配置
diet:
  security:
    secret: smartdietsecretkeyforjwttokenauthsystem123456
    exclude-urls:
      - /api/auth/login
      - /api/auth/public-key
      - /swagger-ui
      - /v3/api-docs
      - /swagger-resources
      - /actuator
      - /api/s3Storage/preview
      - /api/s3Storage/download
      - /api/license/activate
      - /api/license/status

# 密码加密传输，前端公钥加密，后端私钥解密
rsa:
  private_key: 

